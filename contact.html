---
layout: default
title: Contact
---

<main class="flex-grow max-w-3xl mx-auto px-4 py-12 w-full">
    <h1 class="text-4xl font-bold text-teal-700 mb-6 border-b pb-4">Contact Us</h1>
    <p class="text-lg text-gray-700 mb-8">Have questions about our programs, awards, or looking to start a new chapter? We'd love to hear from you.</p>

    <div class="bg-white p-8 rounded-lg shadow">
        <div class="mb-8">
            <h3 class="text-xl font-bold mb-2">General Inquiries</h3>
            <p class="text-gray-600">Email us directly at: <a href="mailto:tcya@tzuchi.us" class="text-teal-600 font-bold hover:underline">tcya@tzuchi.us</a></p>
        </div>

        <form action="mailto:tcya@tzuchi.us" method="POST" enctype="text/plain" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input type="text" class="w-full border border-gray-300 rounded p-2 focus:ring-teal-500 focus:border-teal-500" placeholder="Your Name">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" class="w-full border border-gray-300 rounded p-2 focus:ring-teal-500 focus:border-teal-500" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                <textarea rows="5" class="w-full border border-gray-300 rounded p-2 focus:ring-teal-500 focus:border-teal-500" placeholder="How can we help?"></textarea>
            </div>
            <button type="submit" class="w-full bg-teal-600 text-white font-bold py-3 rounded hover:bg-teal-500 transition">Send Message</button>
            <p class="text-xs text-gray-500 mt-2 text-center">*This will open your default email client to send the message.</p>
        </form>
    </div>
</main>
